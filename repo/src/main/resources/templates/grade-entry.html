<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Ledger</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell wide-shell">
    <div class="row between">
        <h1>Grade Entry Ledger</h1>
        <a th:href="@{/dashboard}">Back to dashboard</a>
    </div>

    <section class="status-block">
        <h2>Enter Grade (Append-Only)</h2>
        <form method="post" th:action="@{/instructor/grades}" class="grid-form">
            <div class="grid-2">
                <input type="number" name="studentId" placeholder="Student ID" required>
                <input type="number" name="classId" placeholder="Class ID" required>
                <input type="number" name="classSessionId" placeholder="Class Session ID">
                <input type="number" name="enrollmentId" placeholder="Enrollment ID">
                <input type="text" name="assessmentKey" placeholder="Assessment Key" required>
                <input type="number" step="0.001" name="rawScore" placeholder="Raw Score" required>
                <input type="number" step="0.001" name="maxScore" placeholder="Max Score" required>
                <select name="operationType">
                    <option>ENTRY</option>
                    <option>EDIT</option>
                    <option>RECALCULATION</option>
                    <option>MANUAL_OVERRIDE</option>
                </select>
                <input type="text" name="reasonCode" placeholder="Reason Code (manual override required)">
                <input type="number" name="previousEntryId" placeholder="Previous Entry ID (for edit/override)">
            </div>
            <div class="row">
                <button type="button" id="previewImpact">Preview Impact</button>
                <button type="submit">Append Ledger Entry</button>
            </div>
        </form>
        <div id="impactPanel" class="impact-panel"></div>
    </section>

    <section class="status-block">
        <h2>Recent Ledger Entries</h2>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>When</th>
                <th>Student</th>
                <th>Class</th>
                <th>Assessment</th>
                <th>Score</th>
                <th>Grade</th>
                <th>Credits</th>
                <th>GPA Impact</th>
                <th>Delta</th>
                <th>Op</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="e : ${entries}">
                <td th:text="${e.id}">1</td>
                <td th:text="${#temporals.format(e.enteredAt, 'yyyy-MM-dd HH:mm:ss')}">2026-01-01 12:00:00</td>
                <td th:text="${e.studentId}">1</td>
                <td th:text="${e.classId}">1</td>
                <td th:text="${e.assessmentKey}">MIDTERM</td>
                <td th:text="${e.rawScore + ' / ' + e.maxScore}">87/100</td>
                <td th:text="${e.gradeLetter}">B+</td>
                <td th:text="${e.creditsEarned}">3.000</td>
                <td th:text="${e.gpaPoints}">9.900</td>
                <td th:text="${e.deltaScore + ' / ' + e.deltaCredits + ' / ' + e.deltaGpaPoints}">-</td>
                <td th:text="${e.operationType}">ENTRY</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<script>
(() => {
  const button = document.getElementById('previewImpact');
  const panel = document.getElementById('impactPanel');
  if (!button || !panel) {
    return;
  }

  button.addEventListener('click', async () => {
    const form = button.closest('form');
    const fd = new FormData(form);
    const payload = {
      studentId: fd.get('studentId') ? Number(fd.get('studentId')) : null,
      classId: fd.get('classId') ? Number(fd.get('classId')) : null,
      classSessionId: fd.get('classSessionId') ? Number(fd.get('classSessionId')) : null,
      enrollmentId: fd.get('enrollmentId') ? Number(fd.get('enrollmentId')) : null,
      assessmentKey: fd.get('assessmentKey'),
      rawScore: fd.get('rawScore') || null,
      maxScore: fd.get('maxScore') || null,
      operationType: fd.get('operationType'),
      reasonCode: fd.get('reasonCode'),
      previousEntryId: fd.get('previousEntryId') ? Number(fd.get('previousEntryId')) : null
    };

    try {
      const response = await fetch('/api/grades/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok) {
        panel.innerHTML = `<p class="status error">Preview failed: ${data.message || 'validation error'}</p>`;
        return;
      }
      panel.innerHTML = `
        <p><strong>Percent:</strong> ${data.percent}</p>
        <p><strong>Grade:</strong> ${data.gradeLetter}</p>
        <p><strong>Credits:</strong> ${data.creditsEarned}</p>
        <p><strong>GPA Impact:</strong> ${data.gpaImpact}</p>
        <p><strong>Delta Score:</strong> ${data.deltaScore ?? 'n/a'}</p>
        <p><strong>Delta Credits:</strong> ${data.deltaCredits ?? 'n/a'}</p>
        <p><strong>Delta GPA:</strong> ${data.deltaGpaImpact ?? 'n/a'}</p>
      `;
    } catch (error) {
      panel.innerHTML = `<p class="status error">Preview failed: ${error.message}</p>`;
    }
  });
})();
</script>
</body>
</html>
