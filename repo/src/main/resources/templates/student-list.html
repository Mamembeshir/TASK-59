<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell wide-shell">
    <div class="row between">
        <h1>Student Lifecycle</h1>
        <a th:href="@{/dashboard}">Back to dashboard</a>
    </div>

    <form method="get" th:action="@{/student}" class="inline-form">
        <input type="text" name="q" placeholder="Search first/last name" th:value="${query}">
        <button type="submit">Search</button>
    </form>

    <section class="status-block">
        <h2>Create Student</h2>
        <form method="post" th:action="@{/student}" class="grid-form">
            <input type="text" name="studentNo" placeholder="Student No" required>
            <input type="text" name="firstName" placeholder="First Name" required>
            <input type="text" name="lastName" placeholder="Last Name" required>
            <input type="text" name="preferredName" placeholder="Preferred Name">
            <input type="date" name="dateOfBirth" required>
            <input type="email" name="contactEmail" placeholder="Contact Email">
            <input type="text" name="contactPhone" placeholder="Contact Phone">
            <input type="text" name="contactAddress" placeholder="Contact Address">
            <input type="text" name="emergencyContact" placeholder="Emergency Contact">
            <button type="submit">Create Student</button>
        </form>
    </section>

    <section class="status-block">
        <h2>Students</h2>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Student No</th>
                <th>Name</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}">1</td>
                <td th:text="${student.studentNo}">S-0001</td>
                <td th:text="${student.firstName + ' ' + student.lastName}">Jane Doe</td>
                <td th:text="${student.status}">ACTIVE</td>
                <td><a th:href="@{/student/{id}(id=${student.id})}">Open</a></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
