<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstituteOps Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell auth-shell">
    <p class="subtitle">Welcome back</p>
    <h1>Sign in to InstituteOps</h1>
    <p class="subtitle">Offline-first operations suite for students, inventory, procurement, group-buy, and recommender flows.</p>
    <form method="post" th:action="@{/login}" class="auth-form">
        <label for="username">Username
            <input id="username" class="field-input" name="username" type="text" autocomplete="username" required autofocus>
        </label>
        <label for="password">Password
            <input id="password" class="field-input" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn-primary" type="submit">Sign In</button>
    </form>
    <p class="status alert-error" th:if="${param.error}">Invalid username or password.</p>
    <p class="status alert-success" th:if="${param.logout}">Signed out successfully.</p>
</main>
</body>
</html>
