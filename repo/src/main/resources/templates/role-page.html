<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Area</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell">
    <h1>Role Protected Area</h1>
    <p>Access granted based on least-privilege RBAC policy.</p>
    <p>Active authorities:</p>
    <ul>
        <li sec:authentication="authorities">[ROLE]</li>
    </ul>
    <a th:href="@{/dashboard}">Back to dashboard</a>
</main>
</body>
</html>
