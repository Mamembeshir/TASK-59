spring:
  datasource:
    url: jdbc:mysql://${TEST_DB_HOST:mysql}:${TEST_DB_PORT:3306}/${TEST_DB_NAME:instituteops}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${TEST_DB_USER:instituteops}
    password: ${TEST_DB_PASSWORD:instituteops}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  thymeleaf:
    cache: false

app:
  upload:
    base-path: /tmp/instituteops-mysql-it-uploads
  encryption:
    aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
